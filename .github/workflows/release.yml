name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - if: ${{ steps.rp.outputs.release_created == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - if: ${{ steps.rp.outputs.release_created == 'true' }}
        uses: kdheepak/panvimdoc@main
        with:
          vimdoc: nyan
          version: "Neovim >= 0.8.0"
          demojify: true
          treesitter: true

      - if: ${{ steps.rp.outputs.release_created == 'true' }}
        name: Commit vimdoc and move tag
        env:
          TAG: ${{ steps.rp.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- doc/; then
            git add doc/
            git commit -m "chore(release): regenerate vimdoc for ${TAG}"
            git push origin HEAD:main
            git tag -f "${TAG}"
            git push origin "${TAG}" --force
          fi

      - if: ${{ steps.rp.outputs.release_created == 'true' }}
        id: changelog
        env:
          VERSION: ${{ steps.rp.outputs.version }}
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          awk -v ver="$VERSION" '
            BEGIN { in_section = 0 }
            /^## / {
              if (in_section) exit
              if ($0 ~ "^## \\[?" ver) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > "$tmp"
          {
            echo "body<<CHANGELOG_EOF"
            cat "$tmp"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - if: ${{ steps.rp.outputs.release_created == 'true' }}
        name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rp.outputs.tag_name }}
          BODY: ${{ steps.changelog.outputs.body }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${BODY}"

      - if: ${{ steps.rp.outputs.release_created == 'true' }}
        name: LuaRocks upload
        uses: nvim-neorocks/luarocks-tag-release@v7
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
