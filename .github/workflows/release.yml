name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (auto|patch|minor|major)"
        required: true
        default: "auto"
        type: choice
        options: [auto, patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and update CHANGELOG
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/release-notes.md
        run: |
          set -euo pipefail
          out=$(./scripts/release.sh --bump "$BUMP")
          echo "$out"
          echo "$out" >> "$GITHUB_OUTPUT"

      - uses: kdheepak/panvimdoc@main
        with:
          vimdoc: nyan
          version: "Neovim >= 0.8.0"
          demojify: true
          treesitter: true

      - name: Commit, tag, push
        env:
          NEXT_VERSION: ${{ steps.bump.outputs.NEXT_VERSION }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt CHANGELOG.md doc/
          git commit -m "chore(release): v${NEXT_VERSION}"
          git tag "v${NEXT_VERSION}"
          git push origin HEAD:main
          git push origin "v${NEXT_VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ steps.bump.outputs.NEXT_VERSION }}
          NOTES_FILE: ${{ steps.bump.outputs.RELEASE_NOTES_PATH }}
        run: |
          set -euo pipefail
          gh release create "v${NEXT_VERSION}" \
            --title "v${NEXT_VERSION}" \
            --notes-file "${NOTES_FILE}"

      - name: LuaRocks upload
        uses: nvim-neorocks/luarocks-tag-release@v7
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
